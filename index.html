<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>otvnvs / portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet"/>
  <style>

    :root {
      --bg: #0d1117;
      --ink: #cdd9e5;
      --muted: #4d6478;
      --accent: #58a6ff;
      --border: #243447;
    }
 
    * { margin: 0; padding: 0; box-sizing: border-box; }
 
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 3rem 2rem;
    }
 
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
 
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
 
    header {
      border-top: 3px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 0;
      margin-bottom: 3rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
    }
 
    .site-title { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; }
    .site-title span { color: var(--accent); }
 
    .gh-link {
      font-family: 'Syne Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .gh-link:hover { color: var(--accent); }
 
    h1 {
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 0.5rem;
    }
    h1 em { font-style: normal; color: var(--accent); }
 
    .subtitle {
      font-family: 'Syne Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 3rem;
      letter-spacing: 0.05em;
    }
 
    #projects { list-style: none; }
 
    #projects li {
      border-bottom: 1px solid rgba(255,255,255,0.06);
      animation: slideUp 0.4s ease both;
    }
 
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    #projects a {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1.5rem;
      padding: 1.1rem 0;
      text-decoration: none;
      color: var(--ink);
      transition: padding-left 0.2s;
    }
    #projects a:hover { padding-left: 0.75rem; }
    #projects a:hover .proj-name { color: var(--accent); }
 
    .proj-name {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      transition: color 0.15s;
      flex-shrink: 0;
    }
 
    .proj-desc {
      font-family: 'Syne Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
 
    .proj-meta {
      font-family: 'Syne Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
 
    .arrow {
      opacity: 0;
      transition: opacity 0.15s;
      color: var(--accent);
      font-size: 1rem;
      flex-shrink: 0;
    }
    #projects a:hover .arrow { opacity: 1; }
 
    .state {
      font-family: 'Syne Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      padding: 2rem 0;
    }
    .state.error { color: var(--accent); }
 
    footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-family: 'Syne Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="site-title"><span>@</span>otvnvs</div>
    <a class="gh-link" href="https://github.com/otvnvs" target="_blank" rel="noopener">github.com/otvnvs ↗</a>
  </header>

  <h1>Work &<br><em>Projects</em></h1>
  <p class="subtitle" id="subtitle">// fetching repos…</p>

  <ul id="projects"><li class="state">Loading…</li></ul>

  <footer>
    <span id="count"></span>
    <span>built with github pages api</span>
  </footer>
</div>

<script>
  //const USERNAME = 'otvnvs';
  const USERNAME = window.location.hostname.split('.')[0];
  const PREFIX   = 'prj-';

  async function load() {
    const list     = document.getElementById('projects');
    const subtitle = document.getElementById('subtitle');
    const count    = document.getElementById('count');

    try {
      const res = await fetch(
        `https://api.github.com/users/${USERNAME}/repos?per_page=100&sort=updated`
      );
      if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
      const repos = await res.json();

      //const projects = repos.filter(r => r.name.startsWith(PREFIX));
      const projects = repos.filter(r => r.name.startsWith(PREFIX) && r.name !== 'prj-portfolio');


      subtitle.textContent = `// ${projects.length} project${projects.length !== 1 ? 's' : ''} found`;
      count.textContent = `${projects.length} repos`;// with prefix "${PREFIX}"`;
      list.innerHTML = '';

      if (!projects.length) {
        list.innerHTML = `<li class="state">No repos starting with "${PREFIX}" found.</li>`;
        return;
      }

      projects.forEach((repo, i) => {
        const slug    = repo.name;
        const label   = slug.replace(PREFIX, '').replace(/-/g, ' ');
        const pageUrl = `https://${USERNAME}.github.io/${slug}/`;
        const stars   = repo.stargazers_count;
        const desc    = repo.description || '';

        const li = document.createElement('li');
        li.style.animationDelay = `${i * 50}ms`;
        li.innerHTML = `
          <a href="${pageUrl}" target="_blank" rel="noopener">
            <span class="proj-name">${label}</span>
            <span class="proj-desc">${desc}</span>
            <span class="proj-meta">${stars ? '&#9733; ' + stars : slug}</span>
            <span class="arrow">&#8594;</span>
          </a>
        `;
        list.appendChild(li);
      });

    } catch (err) {
      list.innerHTML = `<li class="state error">${err.message}</li>`;
      subtitle.textContent = '// error fetching repos';
    }
  }

  load();
</script>
</body>
</html>
