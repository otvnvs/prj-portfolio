<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>otvnvs / portfolio</title>
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="site-title"><span>@</span>otvnvs</div>
        <div class="header-links">
          <a
            class="gh-link"
            href="https://otvnvs.github.io/cv/"
            target="_blank"
            rel="noopener"
            >cv ↗</a
          >
          <a
            class="gh-link"
            href="https://github.com/otvnvs"
            target="_blank"
            rel="noopener"
            >github ↗</a
          >
        </div>
      </header>
      <h1>Work &<br /><em>Projects</em></h1>
      <div class="controls">
        <p class="subtitle" id="subtitle">// initializing...</p>
        <input
          type="text"
          id="search"
          placeholder="search projects / topics..."
        />
        <div id="filters">
          <button class="filter-btn active" data-filter="all">all</button>
        </div>
      </div>
      <ul id="projects">
        <li class="state">Loading...</li>
      </ul>
      <footer>
        <span id="count"></span>
        <span>built with github api</span>
      </footer>
    </div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
